<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البقاء للأقوى</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #F5C518;
    --gold-dark: #C9A000;
    --bg: #0a0a0f;
    --bg2: #12121e;
    --card: #1a1a2e;
    --border: rgba(245,197,24,0.25);
    --text: #fff;
    --muted: rgba(255,255,255,0.5);
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* خلفية متحركة */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
  }
  .bg-orb:nth-child(1) { width: 400px; height: 400px; background: var(--gold); top: -100px; left: -100px; animation-delay: 0s; }
  .bg-orb:nth-child(2) { width: 300px; height: 300px; background: #4a90d9; bottom: -80px; right: -80px; animation-delay: 3s; }
  .bg-orb:nth-child(3) { width: 200px; height: 200px; background: #e74c3c; top: 50%; right: 10%; animation-delay: 6s; }

  @keyframes float {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(20px, -20px) scale(1.05); }
  }

  .container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2rem;
    width: 100%;
    max-width: 600px;
  }

  .logo-wrap {
    margin-bottom: 0.5rem;
    animation: fadeDown 0.8s ease;
  }

  .logo-icon {
    font-size: 4rem;
    display: block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  h1 {
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shine 3s linear infinite, fadeDown 0.8s ease 0.1s both;
    line-height: 1.2;
  }

  @keyframes shine {
    to { background-position: 200% center; }
  }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    margin: 0.5rem 0 2.5rem;
    animation: fadeDown 0.8s ease 0.2s both;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.4rem 1.8rem;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 1.2rem;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent, rgba(245,197,24,0.05));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover {
    transform: translateY(-3px) scale(1.01);
    border-color: var(--gold);
    box-shadow: 0 8px 30px rgba(245,197,24,0.2);
  }

  .card:hover::before { opacity: 1; }

  .card-icon {
    font-size: 2.2rem;
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
  }

  .card.host .card-icon { background: rgba(245,197,24,0.15); }
  .card.player .card-icon { background: rgba(46,204,113,0.15); }
  .card.display .card-icon { background: rgba(74,144,217,0.15); }

  .card-text { text-align: right; flex: 1; }
  .card-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 0.2rem; }
  .card-desc { font-size: 0.82rem; color: var(--muted); }

  .card-arrow {
    font-size: 1.2rem;
    color: var(--muted);
    transition: transform 0.3s, color 0.3s;
  }
  .card:hover .card-arrow { transform: translateX(-4px); color: var(--gold); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .footer {
    margin-top: 2.5rem;
    color: var(--muted);
    font-size: 0.78rem;
    animation: fadeUp 0.8s ease 0.6s both;
  }
</style>
</head>
<body>
<div class="bg-orb"></div>
<div class="bg-orb"></div>
<div class="bg-orb"></div>

<div class="container">
  <div class="logo-wrap">
    <span class="logo-icon">🏆</span>
  </div>
  <h1>البقاء للأقوى</h1>
  <p class="subtitle">لعبة المعلومات التفاعلية للمؤتمرات</p>

  <div class="cards">
    <a href="host.html" class="card host">
      <div class="card-icon">🎮</div>
      <div class="card-text">
        <div class="card-title">لوحة الهوست</div>
        <div class="card-desc">أنشئ غرفة وتحكم في اللعبة</div>
      </div>
      <span class="card-arrow">←</span>
    </a>

    <a href="player.html" class="card player">
      <div class="card-icon">📱</div>
      <div class="card-text">
        <div class="card-title">انضم كلاعب</div>
        <div class="card-desc">ادخل الكود وشارك في اللعبة</div>
      </div>
      <span class="card-arrow">←</span>
    </a>

    <a href="display.html" class="card display">
      <div class="card-icon">🖥️</div>
      <div class="card-text">
        <div class="card-title">شاشة العرض</div>
        <div class="card-desc">للشاشة الكبيرة في القاعة</div>
      </div>
      <span class="card-arrow">←</span>
    </a>
  </div>

  <div class="footer">ادخل كود الغرفة للانضمام · الهوست ينشئ الغرفة أولاً</div>
</div>
</body>
</html>
